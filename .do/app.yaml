name: oneklas-identity
region: tor1
services:
  - name: identity
    github:
      repo: dev1klas/1klas-identity
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    health_check:
      http_path: /healthz
    envs:
      # Service does not need POSTGRES_URL at build time (the binary is
      # statically linked and embeds migrations). Keeping this RUN_TIME
      # narrows the blast radius. The job-level entry below stays
      # RUN_AND_BUILD_TIME — independent of this one.
      - key: POSTGRES_URL
        scope: RUN_TIME
        type: SECRET
      - key: COOKIE_DOMAIN
        scope: RUN_TIME
        value: ""
      - key: COOKIE_SECURE
        scope: RUN_TIME
        value: "true"
      - key: SESSION_TTL_HOURS
        scope: RUN_TIME
        value: "168"
      - key: ARGON2_MEMORY_KIB
        scope: RUN_TIME
        value: "65536"
      - key: ARGON2_TIME
        scope: RUN_TIME
        value: "3"
      - key: ARGON2_PARALLELISM
        scope: RUN_TIME
        value: "1"
      - key: ALLOWED_ORIGINS
        scope: RUN_TIME
        # Cabinet (1klas-web) and gateway origins. The gateway forwards
        # the browser Origin header verbatim, so the cabinet origin must
        # appear here; the api host is permitted for direct curl tests.
        value: "https://app.1klasdev.com,https://api.1klasdev.com"
      - key: RUN_MIGRATIONS_ON_BOOT
        scope: RUN_TIME
        value: "false"
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    github:
      repo: dev1klas/1klas-identity
      branch: main
    source_dir: /
    dockerfile_path: Dockerfile
    run_command: ./bin/migrate up
    envs:
      - key: POSTGRES_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
domains:
  - domain: identity-api.1klasdev.com
    type: PRIMARY
