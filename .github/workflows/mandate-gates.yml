name: mandate

# Mandate gates imported from dev1klas/1klas-ci.
# Sits alongside the local ci.yml (which keeps docker-build + design-
# discipline grep gates specific to this repo).

on: [push, pull_request]

jobs:
  go-mandate:
    uses: dev1klas/1klas-ci/.github/workflows/go-mandate.yml@main
    with:
      go-version: '1.22'
      paths: 'internal/transport/ cmd/'
      # Repo's .golangci.yml uses the v2 config schema.
      golangci-version: 'v2.0.2'

  no-claude-md:
    uses: dev1klas/1klas-ci/.github/workflows/no-claude-md.yml@main
